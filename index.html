
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>LiquidVision Pro — Realtime Liquidation Suite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-deep: #05080f;
      --bg-primary: #0a0f1a;
      --bg-secondary: #0f1622;
      --bg-tertiary: #141c2c;
      --border-subtle: #1e2a3a;
      --border-glow: #2a3a50;
      --text-primary: #eef3fc;
      --text-secondary: #8ea3c2;
      --text-muted: #4a6080;
      --accent: #2b6ef0;
      --accent-glow: #2b6ef0aa;
      --long: #ff4d6d;
      --long-glow: #ff4d6d40;
      --short: #2dcf7c;
      --short-glow: #2dcf7c40;
      --whale: #f5b042;
      --card-radius: 24px;
      --bottom-nav-h: 68px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      height: 100dvh;
      overflow: hidden;
      position: relative;
    }

    /* Glassmorphic premium base */
    .glass-panel {
      background: rgba(15, 22, 34, 0.75);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(43, 110, 240, 0.2);
    }

    /* custom scroll */
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 6px; }

    /* main layout */
    .app-wrapper {
      display: flex;
      flex-direction: column;
      height: 100%;
      position: relative;
    }

    /* header premium */
    .header-pro {
      padding: 14px 20px;
      background: rgba(5, 8, 15, 0.85);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 30;
      flex-shrink: 0;
    }
    .logo-area h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #FFFFFF, var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }
    .logo-area span { font-size: 0.65rem; color: var(--text-secondary); margin-left: 4px; }
    .status-pill {
      background: var(--bg-tertiary);
      padding: 5px 12px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border-subtle);
      font-size: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
    }
    .led {
      width: 8px; height: 8px; border-radius: 50%;
      background: #f43f5e;
      transition: all 0.2s;
    }
    .led.live { background: #2dcf7c; box-shadow: 0 0 8px #2dcf7c; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{ opacity: 1; } 50%{ opacity: 0.5; } }

    /* stats strip */
    .stats-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .stat-block {
      padding: 10px 8px;
      text-align: center;
      border-right: 1px solid var(--border-subtle);
    }
    .stat-block:last-child { border-right: none; }
    .stat-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 0.8px;
    }
    .stat-number {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 1rem;
      margin-top: 4px;
    }
    .stat-number.long { color: var(--long); }
    .stat-number.short { color: var(--short); }
    .stat-number.accent { color: var(--accent); }
    .stat-number.whale { color: var(--whale); }

    /* ratio micro bar */
    .ratio-micro {
      height: 3px;
      background: var(--bg-tertiary);
      width: 100%;
      flex-shrink: 0;
    }
    .ratio-fill {
      height: 100%;
      width: 50%;
      background: linear-gradient(90deg, var(--long), var(--short));
      transition: width 0.4s ease;
    }

    /* === TABS CONTAINER === */
    .tabs-container {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .tab-page {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      overflow-y: auto;
      padding: 0 0 calc(var(--bottom-nav-h) + 12px) 0;
      scrollbar-width: thin;
    }
    .tab-page.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* feed filters */
    .filter-strip {
      display: flex;
      gap: 6px;
      padding: 10px 12px;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-subtle);
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: none;
    }
    .filter-strip::-webkit-scrollbar { display: none; }
    .chip {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: 40px;
      padding: 6px 14px;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text-secondary);
      white-space: nowrap;
      transition: all 0.15s;
    }
    .chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .chip.long-active { background: var(--long); color: white; border-color: var(--long); }
    .chip.short-active { background: var(--short); color: white; border-color: var(--short); }

    /* feed header */
    .feed-header {
      display: grid;
      grid-template-columns: 36px 1fr 90px 100px;
      padding: 8px 12px;
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-primary);
      flex-shrink: 0;
    }
    .feed-header span:nth-child(3),
    .feed-header span:nth-child(4) { text-align: right; }

    /* liquidation rows */
    .liq-row {
      display: grid;
      grid-template-columns: 36px 1fr 90px 100px;
      align-items: center;
      padding: 10px 8px;
      margin: 0 6px 6px 6px;
      background: var(--bg-secondary);
      border-radius: 18px;
      border-left: 3px solid;
      transition: all 0.15s;
    }
    .liq-row.long-liq { border-left-color: var(--long); background: linear-gradient(90deg, rgba(255,77,109,0.08), var(--bg-secondary)); }
    .liq-row.short-liq { border-left-color: var(--short); background: linear-gradient(90deg, rgba(45,207,124,0.06), var(--bg-secondary)); }
    .liq-row.whale-highlight { border-left-color: var(--whale); box-shadow: 0 0 12px rgba(245,176,66,0.2); }
    .coin-icon {
      width: 32px; height: 32px;
      background: var(--bg-tertiary);
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    .sym-detail .sym-name { font-weight: 600; font-size: 0.85rem; }
    .sym-side { font-size: 0.65rem; font-weight: 500; }
    .value-cell { text-align: right; }
    .usd-value { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 0.85rem; }
    .time-stamp { font-size: 0.6rem; color: var(--text-muted); }
    .link-group {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }
    .ex-link {
      background: var(--bg-tertiary);
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 0.65rem;
      text-decoration: none;
      color: var(--text-secondary);
      transition: 0.1s;
    }

    /* analytics cards */
    .analytics-card {
      background: var(--bg-secondary);
      border-radius: 24px;
      margin: 12px 12px;
      padding: 12px;
      border: 1px solid var(--border-subtle);
    }
    .card-title {
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
    }
    canvas.analytics-canvas { max-height: 150px; width: 100%; }

    /* symbol ranking */
    .rank-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .rank-symbol { font-weight: 500; }
    .rank-value { font-family: monospace; color: var(--whale); }

    /* settings */
    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 12px;
      background: var(--bg-tertiary);
      border-radius: 20px;
      margin-bottom: 8px;
    }
    .toggle {
      width: 44px;
      height: 24px;
      background: var(--border-subtle);
      border-radius: 30px;
      position: relative;
      cursor: pointer;
      transition: 0.2s;
    }
    .toggle.active { background: var(--accent); }
    .toggle::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: 0.2s;
    }
    .toggle.active::after { left: 22px; }
    input.threshold-input {
      background: var(--bg-primary);
      border: 1px solid var(--border-subtle);
      border-radius: 40px;
      padding: 10px 12px;
      color: white;
      width: 100%;
      font-family: monospace;
    }

    /* bottom navbar — no overlap, safe area */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: calc(var(--bottom-nav-h) + var(--safe-bottom));
      background: rgba(10, 15, 26, 0.96);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border-subtle);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: var(--safe-bottom);
      z-index: 40;
    }
    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 0.65rem;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 40px;
      transition: 0.15s;
    }
    .nav-btn i { font-size: 1.5rem; font-style: normal; }
    .nav-btn.active { color: var(--accent); background: rgba(43,110,240,0.12); }
    .nav-badge {
      background: var(--long);
      color: white;
      font-size: 0.6rem;
      border-radius: 20px;
      padding: 0px 6px;
      margin-left: 4px;
    }

    /* scroll to top pill */
    .scroll-pill {
      position: fixed;
      bottom: calc(var(--bottom-nav-h) + 12px);
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg-secondary);
      border: 1px solid var(--accent);
      padding: 6px 18px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--accent);
      backdrop-filter: blur(12px);
      transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      z-index: 45;
      cursor: pointer;
      white-space: nowrap;
    }
    .scroll-pill.visible { transform: translateX(-50%) translateY(0); }

    /* whale toast */
    .whale-toast {
      position: fixed;
      top: 72px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(20px);
      border: 1px solid var(--whale);
      border-radius: 60px;
      padding: 6px 20px;
      color: var(--whale);
      font-family: monospace;
      font-size: 0.75rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 60;
      transition: transform 0.25s ease;
      pointer-events: none;
      white-space: nowrap;
    }
    .whale-toast.show { transform: translateX(-50%) translateY(0); }

    /* empty state */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
    }

    @media (max-width: 480px) {
      .feed-header { grid-template-columns: 36px 1fr 80px 90px; }
      .liq-row { grid-template-columns: 36px 1fr 80px 90px; }
      .usd-value { font-size: 0.75rem; }
    }
  </style>
</head>
<body>
<div class="app-wrapper">
  <div class="header-pro">
    <div class="logo-area"><h1>LIQUID<span style="font-weight:400;">VISION</span><span>PRO</span></h1></div>
    <div class="status-pill"><div class="led" id="wsLed"></div><span id="wsStatus">CONNECT</span></div>
  </div>

  <div class="stats-strip">
    <div class="stat-block"><div class="stat-label">VOLUME</div><div class="stat-number accent" id="statVol">$0</div></div>
    <div class="stat-block"><div class="stat-label">LONGS</div><div class="stat-number long" id="statLongs">0</div></div>
    <div class="stat-block"><div class="stat-label">SHORTS</div><div class="stat-number short" id="statShorts">0</div></div>
    <div class="stat-block"><div class="stat-label">BIGGEST</div><div class="stat-number whale" id="statBiggest">-</div></div>
  </div>
  <div class="ratio-micro"><div class="ratio-fill" id="ratioFill"></div></div>

  <!-- TABS CONTAINER -->
  <div class="tabs-container">
    <!-- FEED TAB -->
    <div class="tab-page active" id="tab-feed">
      <div class="filter-strip" id="filterStrip">
        <button class="chip active" data-filter="amount" data-val="0">ALL</button>
        <button class="chip" data-filter="amount" data-val="1000">>1K</button>
        <button class="chip" data-filter="amount" data-val="10000">>10K</button>
        <button class="chip" data-filter="amount" data-val="100000">>100K</button>
        <button class="chip" data-filter="amount" data-val="500000">>500K</button>
        <div style="width:1px; background:#1e2a3a; margin:0 4px;"></div>
        <button class="chip" data-filter="side" data-side="all">ALL SIDE</button>
        <button class="chip" data-filter="side" data-side="long">▲ LONG</button>
        <button class="chip" data-filter="side" data-side="short">▼ SHORT</button>
      </div>
      <div style="display: flex; gap: 6px; padding: 8px 12px; background: var(--bg-primary);">
        <input type="text" id="symbolFilter" placeholder="Symbol filter" style="flex:1; background: var(--bg-tertiary); border: 1px solid var(--border-subtle); border-radius: 40px; padding: 8px 12px; color: white; font-size: 0.7rem;">
        <button id="sortTimeBtn" class="chip" style="background:var(--accent); color:white;">TIME ▼</button>
        <button id="sortSizeBtn" class="chip">SIZE ▼</button>
      </div>
      <div class="feed-header"><span></span><span>SYMBOL</span><span>VALUE</span><span>TRADE</span></div>
      <div id="feedList" style="flex:1; overflow-y: auto; padding: 4px 0 20px;"></div>
    </div>

    <!-- ANALYTICS TAB -->
    <div class="tab-page" id="tab-analytics">
      <div class="analytics-card"><div class="card-title">📈 VOLUME FLOW (60s)</div><canvas id="volCanvas" class="analytics-canvas" height="120"></canvas></div>
      <div class="analytics-card"><div class="card-title">🏆 TOP SYMBOLS</div><div id="topSymbolsList"></div></div>
      <div class="analytics-card"><div class="card-title">📊 LONG/SHORT RATIO</div><canvas id="donutCanvas" width="200" height="140" style="max-height:140px; margin:0 auto;"></canvas></div>
      <div class="analytics-card"><div class="card-title">📋 SESSION STATS</div><div id="sessionStats" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;"></div></div>
    </div>

    <!-- SETTINGS TAB -->
    <div class="tab-page" id="tab-settings">
      <div class="analytics-card">
        <div class="setting-item"><span>🔊 Sound Alerts</span><div class="toggle" id="toggleSound"></div></div>
        <div class="setting-item"><span>🔔 Push Notifications</span><div class="toggle" id="toggleNotif"></div></div>
        <div class="setting-item"><span>🐋 Whale Highlight</span><div class="toggle" id="toggleWhale"></div></div>
        <div style="margin-top: 16px;"><label class="stat-label">Alert Threshold ($)</label><input type="number" id="alertThresh" class="threshold-input" value="10000" step="1000"></div>
        <div style="margin-top: 12px;"><label class="stat-label">Whale Size ($)</label><input type="number" id="whaleSizeInput" class="threshold-input" value="500000" step="50000"></div>
        <button id="resetSessionBtn" style="margin-top: 20px; width:100%; background: rgba(255,77,109,0.1); border:1px solid var(--long); border-radius: 40px; padding: 10px; color: var(--long);">CLEAR SESSION</button>
        <div class="stat-label" style="margin-top: 20px; text-align:center;">Data via Binance Futures • real-time</div>
      </div>
    </div>
  </div>

  <div class="scroll-pill" id="scrollPill">▲ NEW LIQUIDATIONS</div>
  <div class="whale-toast" id="whaleToast">🐋 <span id="toastMsg"></span></div>
  <div class="bottom-nav"><button class="nav-btn active" data-tab="feed"><i>📡</i><span>Live</span></button><button class="nav-btn" data-tab="analytics"><i>📊</i><span>Analytics</span></button><button class="nav-btn" data-tab="settings"><i>⚙️</i><span>Settings</span></button></div>
</div>

<script>
  // ----------------------------- WEBSOCKET & STATE ---------------------------------
  const WS_URL = "wss://fstream.binance.com/ws/!forceOrder@arr";
  let items = [];               // all items max 200
  let buffer = [];
  let stats = { vol: 0, longCount: 0, shortCount: 0, longVol: 0, shortVol: 0, biggest: 0 };
  let filterAmount = 0, filterSide = "all", filterSymbol = "";
  let sortMode = "time";       // time or size
  let isPaused = false;
  let ws = null, reconnectAttempt = 0;

  // settings
  let settings = { sound: true, desktop: false, whaleHighlight: true, alertThreshold: 10000, whaleSize: 500000 };
  try { const saved = localStorage.getItem("liquidvision_cfg"); if(saved) settings = { ...settings, ...JSON.parse(saved) }; } catch(e) {}

  // volume timeline (60 buckets, 500ms tick -> 30s windows? we'll use 60 buckets = 30s)
  let volTimeline = Array(60).fill().map(() => ({ l: 0, s: 0 }));
  let symMap = new Map(); // symbol -> { total, longVol, shortVol, count }

  // charts
  let volChart, donutChart;

  // DOM elements
  const feedDiv = document.getElementById("feedList");
  const statVolSpan = document.getElementById("statVol");
  const statLongSpan = document.getElementById("statLongs");
  const statShortSpan = document.getElementById("statShorts");
  const statBiggestSpan = document.getElementById("statBiggest");
  const ratioFill = document.getElementById("ratioFill");
  const wsLed = document.getElementById("wsLed");
  const wsStatus = document.getElementById("wsStatus");

  // helpers
  const fmt = (v) => { if(v>=1e9) return `$${(v/1e9).toFixed(2)}B`; if(v>=1e6) return `$${(v/1e6).toFixed(2)}M`; if(v>=1e3) return `$${(v/1e3).toFixed(1)}K`; return `$${v.toFixed(0)}`; };
  const getBaseSymbol = (sym) => sym.replace(/USDT|BUSD|USDC|USD/, "");
  const timeStr = (ts) => new Date(ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});

  // sound
  function playBeep(whale) {
    try { const AC = window.AudioContext || window.webkitAudioContext; if(!AC) return; const ctx = new AC(); const o = ctx.createOscillator(), g = ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.type = whale ? "sawtooth" : "sine"; o.frequency.value = whale ? 520 : 880; g.gain.value = 0.08; o.start(); g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + (whale ? 0.35 : 0.12)); o.stop(ctx.currentTime + (whale ? 0.35 : 0.12)); } catch(e){} }

  function showWhaleToast(symbol, value, side) {
    const el = document.getElementById("whaleToast");
    document.getElementById("toastMsg").innerHTML = `<strong>${symbol}</strong> ${fmt(value)} ${side === "SELL" ? "▲ LONG" : "▼ SHORT"}`;
    el.classList.add("show");
    clearTimeout(window.toastTimer); window.toastTimer = setTimeout(() => el.classList.remove("show"), 2800);
  }

  // process new liquidation
  function addLiquidation(item) {
    const val = item.valueUSD;
    const isLong = item.side === "SELL";
    stats.vol += val;
    if(isLong) { stats.longCount++; stats.longVol += val; } else { stats.shortCount++; stats.shortVol += val; }
    if(val > stats.biggest) stats.biggest = val;

    const base = getBaseSymbol(item.symbol);
    if(!symMap.has(base)) symMap.set(base, { total:0, longVol:0, shortVol:0, count:0 });
    let symData = symMap.get(base);
    symData.total += val; symData.count++;
    if(isLong) symData.longVol += val; else symData.shortVol += val;

    // update timeline
    const last = volTimeline[volTimeline.length-1];
    if(isLong) last.l += val; else last.s += val;

    // alerts
    const isWhale = val >= settings.whaleSize;
    if(val >= settings.alertThreshold) {
      if(settings.sound) playBeep(isWhale);
      if(isWhale) showWhaleToast(base, val, item.side);
      if(settings.desktop && document.hidden && Notification.permission === "granted") {
        new Notification(`${isWhale ? "🐋 " : ""}${item.symbol}`, { body: `${fmt(val)} ${isLong ? "LONG" : "SHORT"} LIQ`, silent: true });
      }
    }
    items.unshift(item);
    if(items.length > 200) items.pop();
    if(!isPaused && sortMode === "time") renderFeed();
    else if(sortMode === "size") renderFeed();
  }

  function renderFeed() {
    let filtered = items.filter(i => i.valueUSD >= filterAmount);
    if(filterSide === "long") filtered = filtered.filter(i => i.side === "SELL");
    if(filterSide === "short") filtered = filtered.filter(i => i.side === "BUY");
    if(filterSymbol.trim()) filtered = filtered.filter(i => getBaseSymbol(i.symbol).toUpperCase().includes(filterSymbol.toUpperCase()));
    if(sortMode === "size") filtered.sort((a,b) => b.valueUSD - a.valueUSD);
    else filtered.sort((a,b) => b.time - a.time);
    if(filtered.length === 0) { feedDiv.innerHTML = '<div class="empty-state">⚡ No liquidations match</div>'; return; }
    feedDiv.innerHTML = filtered.map(item => {
      const isLong = item.side === "SELL";
      const isWhale = settings.whaleHighlight && item.valueUSD >= settings.whaleSize;
      const rowClass = `liq-row ${isLong ? "long-liq" : "short-liq"} ${isWhale ? "whale-highlight" : ""}`;
      const sideLabel = isLong ? (isWhale ? "🐋 LONG" : "▲ LONG") : (isWhale ? "🐋 SHORT" : "▼ SHORT");
      const base = getBaseSymbol(item.symbol);
      const tvUrl = `https://www.tradingview.com/chart/?symbol=BINANCE:${item.symbol}.P`;
      const mexcUrl = `https://futures.mexc.com/exchange/${base}_USDT`;
      return `<div class="${rowClass}">
        <div class="coin-icon">${base.slice(0,2)}</div>
        <div class="sym-detail"><div class="sym-name">${base}<span style="font-size:0.6rem;">·P</span></div><div class="sym-side" style="color:${isLong ? 'var(--long)' : 'var(--short)'}">${sideLabel}</div></div>
        <div class="value-cell"><div class="usd-value" style="color:${isWhale ? 'var(--whale)' : (isLong ? 'var(--long)' : 'var(--short)')}">${fmt(item.valueUSD)}</div><div class="time-stamp">${timeStr(item.time)}</div></div>
        <div class="link-group"><a class="ex-link" href="${tvUrl}" target="_blank">TV</a><a class="ex-link" href="${mexcUrl}" target="_blank">MEXC</a></div>
      </div>`;
    }).join("");
  }

  function updateStatsUI() {
    statVolSpan.innerText = fmt(stats.vol);
    statLongSpan.innerText = stats.longCount;
    statShortSpan.innerText = stats.shortCount;
    statBiggestSpan.innerText = stats.biggest ? fmt(stats.biggest) : "-";
    const total = stats.longCount + stats.shortCount;
    const longPct = total === 0 ? 50 : (stats.longCount / total) * 100;
    ratioFill.style.width = `${longPct}%`;
    // update donut if exists
    if(donutChart) donutChart.data.datasets[0].data = [stats.longCount, stats.shortCount]; donutChart?.update();
    updateAnalyticsPanel();
  }

  function updateAnalyticsPanel() {
    if(document.getElementById("tab-analytics").classList.contains("active")) {
      updateTopSymbols();
      const sDiv = document.getElementById("sessionStats");
      if(sDiv) sDiv.innerHTML = `<div>📊 Total Vol<br><strong>${fmt(stats.vol)}</strong></div><div>📈 Avg Size<br><strong>${stats.longCount+stats.shortCount>0?fmt(stats.vol/(stats.longCount+stats.shortCount)):"-"}</strong></div><div>🔥 Long Vol<br><strong style="color:var(--long);">${fmt(stats.longVol)}</strong></div><div>💚 Short Vol<br><strong style="color:var(--short);">${fmt(stats.shortVol)}</strong></div>`;
      updateVolumeChart();
    }
  }

  function updateVolumeChart() {
    if(!volChart) return;
    const labels = volTimeline.map((_,i)=>i);
    const longData = volTimeline.map(b=>b.l);
    const shortData = volTimeline.map(b=>b.s);
    volChart.data.datasets[0].data = longData;
    volChart.data.datasets[1].data = shortData;
    volChart.update();
  }
  function updateTopSymbols() {
    const sorted = Array.from(symMap.entries()).sort((a,b)=>b[1].total - a[1].total).slice(0,6);
    const container = document.getElementById("topSymbolsList");
    if(!container) return;
    if(sorted.length===0) { container.innerHTML = "<div class='empty-state'>—</div>"; return; }
    container.innerHTML = sorted.map(([sym,data]) => `<div class="rank-row"><span class="rank-symbol">${sym}</span><span class="rank-value">${fmt(data.total)}</span></div>`).join("");
  }

  function initCharts() {
    const ctxVol = document.getElementById("volCanvas").getContext("2d");
    volChart = new Chart(ctxVol, { type: "line", data: { labels: [], datasets: [{ label: "Long Vol", data: [], borderColor: "#ff4d6d", backgroundColor: "rgba(255,77,109,0.1)", fill: true, tension:0.2 }, { label: "Short Vol", data: [], borderColor: "#2dcf7c", backgroundColor: "rgba(45,207,124,0.05)", fill: true, tension:0.2 }] }, options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: "#8ea3c2" } } } } });
    const ctxDonut = document.getElementById("donutCanvas").getContext("2d");
    donutChart = new Chart(ctxDonut, { type: "doughnut", data: { labels: ["Long", "Short"], datasets: [{ data: [0,0], backgroundColor: ["#ff4d6d", "#2dcf7c"], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: "bottom", labels: { color: "#eef3fc" } } } } });
    updateVolumeChart();
  }

  // buffer loop
  function processBuffer() {
    if(buffer.length === 0) return;
    for(let it of buffer) addLiquidation(it);
    buffer = [];
    updateStatsUI();
    if(sortMode === "time" && !isPaused) renderFeed(); else if(sortMode === "size") renderFeed();
    // rotate vol timeline every 0.5s? we rotate every 500ms by adding new bucket each 2 cycles? we do simpler: push every sec
  }
  let tickCount = 0;
  function timelineRotate() { tickCount++; if(tickCount>=2) { tickCount=0; volTimeline.push({l:0,s:0}); if(volTimeline.length>60) volTimeline.shift(); updateVolumeChart(); } }

  // websocket
  function connectWS() {
    if(ws) ws.close();
    ws = new WebSocket(WS_URL);
    ws.onopen = () => { wsLed.classList.add("live"); wsStatus.innerText = "LIVE"; reconnectAttempt=0; };
    ws.onmessage = (e) => { try { const d = JSON.parse(e.data); if(d.e !== "forceOrder") return; const o = d.o; const val = parseFloat(o.p) * parseFloat(o.q); buffer.push({ symbol: o.s, side: o.S, valueUSD: val, time: d.E }); } catch(e){} };
    ws.onclose = () => { wsLed.classList.remove("live"); wsStatus.innerText = "RETRY"; setTimeout(()=>connectWS(), Math.min(5000, 1000*(++reconnectAttempt))); };
    ws.onerror = () => ws.close();
  }

  // UI interactions
  function setupFilters() {
    document.querySelectorAll("[data-filter='amount']").forEach(btn => btn.addEventListener("click", (e) => { document.querySelectorAll("[data-filter='amount']").forEach(b=>b.classList.remove("active")); btn.classList.add("active"); filterAmount = parseInt(btn.dataset.val); renderFeed(); }));
    document.querySelectorAll("[data-filter='side']").forEach(btn => btn.addEventListener("click", (e) => { filterSide = btn.dataset.side; document.querySelectorAll("[data-filter='side']").forEach(b=>b.classList.remove("active","long-active","short-active")); if(filterSide==="long") btn.classList.add("long-active"); else if(filterSide==="short") btn.classList.add("short-active"); else btn.classList.add("active"); renderFeed(); }));
    document.getElementById("symbolFilter").addEventListener("input", (e) => { filterSymbol = e.target.value; renderFeed(); });
    document.getElementById("sortTimeBtn").addEventListener("click", () => { sortMode = "time"; document.getElementById("sortTimeBtn").style.background = "var(--accent)"; document.getElementById("sortSizeBtn").style.background = ""; renderFeed(); });
    document.getElementById("sortSizeBtn").addEventListener("click", () => { sortMode = "size"; document.getElementById("sortSizeBtn").style.background = "var(--accent)"; document.getElementById("sortTimeBtn").style.background = ""; renderFeed(); });
  }

  function setupTabs() {
    const btns = document.querySelectorAll(".nav-btn");
    const pages = { feed: document.getElementById("tab-feed"), analytics: document.getElementById("tab-analytics"), settings: document.getElementById("tab-settings") };
    btns.forEach(btn => btn.addEventListener("click", () => { const tab = btn.dataset.tab; Object.values(pages).forEach(p=>p.classList.remove("active")); pages[tab].classList.add("active"); btns.forEach(b=>b.classList.remove("active")); btn.classList.add("active"); if(tab==="analytics") { updateTopSymbols(); updateVolumeChart(); donutChart?.update(); updateAnalyticsPanel(); } if(tab==="feed") renderFeed(); }));
  }
  function scrollPillLogic() { const feedScroller = document.getElementById("feedList"); if(feedScroller) feedScroller.addEventListener("scroll", () => { const pill = document.getElementById("scrollPill"); if(feedScroller.scrollTop > 100) { isPaused = true; pill.classList.add("visible"); } else { isPaused = false; pill.classList.remove("visible"); } }); document.getElementById("scrollPill").addEventListener("click", () => { document.getElementById("feedList").scrollTo({ top:0, behavior:"smooth" }); isPaused=false; document.getElementById("scrollPill").classList.remove("visible"); }); }

  function settingsUI() {
    const toggleSound = document.getElementById("toggleSound"); const toggleNotif = document.getElementById("toggleNotif"); const toggleWhale = document.getElementById("toggleWhale");
    const updateToggle = (el, state) => { if(state) el.classList.add("active"); else el.classList.remove("active"); };
    updateToggle(toggleSound, settings.sound); updateToggle(toggleNotif, settings.desktop); updateToggle(toggleWhale, settings.whaleHighlight);
    toggleSound.addEventListener("click", () => { settings.sound = !settings.sound; updateToggle(toggleSound, settings.sound); localStorage.setItem("liquidvision_cfg", JSON.stringify(settings)); });
    toggleNotif.addEventListener("click", () => { if(!settings.desktop && Notification.permission !== "granted") Notification.requestPermission().then(p=>{ if(p==="granted"){ settings.desktop=true; updateToggle(toggleNotif,true); localStorage.setItem("liquidvision_cfg", JSON.stringify(settings)); } }); else { settings.desktop = !settings.desktop; updateToggle(toggleNotif, settings.desktop); localStorage.setItem("liquidvision_cfg", JSON.stringify(settings)); } });
    toggleWhale.addEventListener("click", () => { settings.whaleHighlight = !settings.whaleHighlight; updateToggle(toggleWhale, settings.whaleHighlight); localStorage.setItem("liquidvision_cfg", JSON.stringify(settings)); renderFeed(); });
    document.getElementById("alertThresh").addEventListener("change", (e) => { settings.alertThreshold = parseFloat(e.target.value); localStorage.setItem("liquidvision_cfg", JSON.stringify(settings)); });
    document.getElementById("whaleSizeInput").addEventListener("change", (e) => { settings.whaleSize = parseFloat(e.target.value); localStorage.setItem("liquidvision_cfg", JSON.stringify(settings)); });
    document.getElementById("resetSessionBtn").addEventListener("click", () => { items = []; stats = { vol:0, longCount:0, shortCount:0, longVol:0, shortVol:0, biggest:0 }; symMap.clear(); volTimeline = Array(60).fill().map(()=>({l:0,s:0})); buffer = []; updateStatsUI(); renderFeed(); updateTopSymbols(); updateVolumeChart(); if(donutChart) donutChart.data.datasets[0].data = [0,0]; donutChart?.update(); });
  }

  setInterval(() => { timelineRotate(); processBuffer(); }, 500);
  connectWS();
  setupFilters();
  setupTabs();
  scrollPillLogic();
  settingsUI();
  initCharts();
  updateStatsUI();
</script>
</body>
</html>
